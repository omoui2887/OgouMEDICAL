# ============================================================
# MediSaaS CI — Docker Compose (développement local)
# ============================================================
version: "3.9"

services:
  # ---------- Application Next.js (frontend) ----------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: medisaas-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://medisaas:medisaas@db:5432/medisaas
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/web/.next
    depends_on:
      - db
      - api
    command: bun run dev
    networks:
      - medisaas-network

  # ---------- API NestJS (backend) ----------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: medisaas-api
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=postgresql://medisaas:medisaas@db:5432/medisaas
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - CINETPAY_API_KEY=${CINETPAY_API_KEY}
      - CINETPAY_SITE_ID=${CINETPAY_SITE_ID}
      - AFRICASTALKING_API_KEY=${AFRICASTALKING_API_KEY}
      - DAILY_API_KEY=${DAILY_API_KEY}
      - RESEND_API_KEY=${RESEND_API_KEY}
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: bun run dev
    networks:
      - medisaas-network

  # ---------- PostgreSQL (base de données locale) ----------
  db:
    image: postgres:16-alpine
    container_name: medisaas-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: medisaas
      POSTGRES_PASSWORD: medisaas
      POSTGRES_DB: medisaas
    ports:
      - "5432:5432"
    volumes:
      - medisaas-db-data:/var/lib/postgresql/data
      - ./supabase/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medisaas"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - medisaas-network

  # ---------- Redis (cache + file de jobs BullMQ) ----------
  redis:
    image: redis:7-alpine
    container_name: medisaas-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - medisaas-redis-data:/data
    networks:
      - medisaas-network

  # ---------- Mailhog (emails locaux — alternative à Resend) ----------
  mailhog:
    image: mailhog/mailhog:latest
    container_name: medisaas-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - medisaas-network

volumes:
  medisaas-db-data:
  medisaas-redis-data:

networks:
  medisaas-network:
    driver: bridge
